services:
  prod-assets-init:
    build:
      context: ./server
    environment:
      - APP_MODE=${APP_MODE:-dev}
      - SQLITE_DB_PATH=/app/data/users.db
    volumes:
      - sqlite_db:/app/data
      - model_data:/app/model-data
      - ./server/data:/assets/sqlite:ro
      - ./model/prebuilt/trained:/assets/model:ro
    command:
      - bash
      - -c
      - |
        set -e
        if [ "${APP_MODE:-dev}" != "prod" ]; then
          echo "Skipping prod asset bootstrap (APP_MODE=${APP_MODE:-dev})"
          exit 0
        fi

        mkdir -p /app/data /app/model-data/ml_models/trained

        if [ -f /assets/sqlite/users.db ]; then
          rm -f /app/data/users.db /app/data/users.db-wal /app/data/users.db-shm
          cp /assets/sqlite/users.db /app/data/users.db
          echo "Seeded sqlite volume from prebuilt ./server/data/users.db"
          embedding_count="$(
            node -e "const { DatabaseSync } = require('node:sqlite'); const db = new DatabaseSync('/app/data/users.db'); const row = db.prepare('SELECT COUNT(*) AS c FROM user_embeddings').get(); db.close(); process.stdout.write(String((row && row.c) || 0));" 2>/dev/null || true
          )"
          if ! [[ "$$embedding_count" =~ ^[0-9]+$ ]] || [ "$$embedding_count" -eq 0 ]; then
            echo "Prebuilt DB validation failed (user_embeddings=$$embedding_count); generating seeded DB..."
            rm -f /app/data/users.db /app/data/users.db-wal /app/data/users.db-shm
            /app/seedDbGit.sh
            echo "Generated sqlite DB from seed scripts"
          else
            echo "Verified prebuilt sqlite DB (user_embeddings=$$embedding_count)"
          fi
        else
          echo "No prebuilt DB found at ./server/data/users.db; generating seeded DB..."
          rm -f /app/data/users.db /app/data/users.db-wal /app/data/users.db-shm
          /app/seedDbGit.sh
          echo "Generated sqlite DB from seed scripts"
        fi

        if [ -f /assets/model/arcface_yale_anony_v1_label_encoder.joblib ]; then
          rm -rf /app/model-data/ml_models/trained
          mkdir -p /app/model-data/ml_models/trained
          cp -R /assets/model/. /app/model-data/ml_models/trained/
          echo "Seeded model volume with prebuilt artifacts"
        else
          echo "No prebuilt model artifacts found in ./model/prebuilt/trained"
          echo "Model will be trained from DB on first prod startup"
        fi

  server:
    build:
      context: ./server
    env_file:
      - ${SERVER_ENV_FILE:-./server/.env}
    environment:
      - MODEL_BASE_URL=${MODEL_BASE_URL:-http://model:5000}
      - SQLITE_DB_PATH=/app/data/users.db
    ports:
      - "4000:4000"
    volumes:
      - sqlite_db:/app/data
    depends_on:
      prod-assets-init:
        condition: service_completed_successfully
      model:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    environment:
      - SERVER_BASE_URL=http://server:4000
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  model:
    build:
      context: ./model
    environment:
      - EXPRESS_BASE_URL=http://server:4000
      - SQLITE_DB_PATH=/app/shared-db/users.db
    ports:
      - "5000:5000"
    volumes:
      - model_data:/app/data
      - sqlite_db:/app/shared-db
    depends_on:
      prod-assets-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlite_db:
  model_data:
