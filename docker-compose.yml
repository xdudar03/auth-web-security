services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      - MODEL_BASE_URL=http://model:5000
      - SESSION_SECRET=${SESSION_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SQLITE_DB_PATH=/app/data/users.db
    ports:
      - "4000:4000"
    volumes:
      - sqlite_db:/app/data
    depends_on:
      model:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    environment:
      - SERVER_BASE_URL=http://server:4000
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  model:
    build:
      context: ./model
    environment:
      - EXPRESS_BASE_URL=http://server:4000
    ports:
      - "5000:5000"
    volumes:
      - model_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5000/health').getcode()==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sqlite_db:
  model_data:
