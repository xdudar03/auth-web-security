name: Build Model Artifact Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional tag override (defaults to commit SHA)"
        required: false
        type: string
  push:
    branches: [main, master]
    paths:
      - "model/**"
      - "server/src/seed/**"
      - "server/seedDbGit.sh"
      - "server/seedDb.sh"
      - "docker-compose.yml"
      - ".github/workflows/model-artifact.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_repo="${owner_lc}/auth-model-artifacts"
          tag_input="${{ github.event.inputs.image_tag }}"
          if [ -n "${tag_input}" ]; then
            image_tag="${tag_input}"
          else
            image_tag="${GITHUB_SHA}"
          fi
          echo "IMAGE_REPO=${image_repo}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${image_repo}:${image_tag}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env files for compose
        run: |
          cp .env.example .env
          cp server/.env.example server/.env

      - name: Build and start model stack
        run: docker compose up -d --build model server

      - name: Seed DB and request initial training
        run: docker compose exec -T server bash -lc "/app/seedDbGit.sh"

      - name: Wait for trained model artifacts
        run: |
          set -euo pipefail
          if ! docker compose exec -T model sh -lc '
            label_file="/app/data/ml_models/trained/arcface_yale_anony_v1_label_encoder.joblib"
            templates_file="/app/data/ml_models/trained/arcface_yale_anony_v1_rp_templates.joblib"
            timeout_seconds=1200
            interval_seconds=2
            start_ts="$(date +%s)"
            end_ts="$((start_ts + timeout_seconds))"

            while [ "$(date +%s)" -lt "$end_ts" ]; do
              if [ -f "$label_file" ] && [ -f "$templates_file" ]; then
                echo "Trained artifacts detected."
                exit 0
              fi
              sleep "$interval_seconds"
            done

            echo "Timed out waiting for trained artifacts after ${timeout_seconds}s."
            exit 1
          '; then
            docker compose logs --tail=200 model
            exit 1
          fi

      - name: Export trained artifacts
        run: |
          set -euo pipefail
          rm -rf model-artifacts
          mkdir -p model-artifacts
          docker compose cp model:/app/data/ml_models/trained/. ./model-artifacts/
          test -f ./model-artifacts/arcface_yale_anony_v1_label_encoder.joblib
          test -f ./model-artifacts/arcface_yale_anony_v1_rp_templates.joblib

      - name: Build artifact image
        run: |
          set -euo pipefail
          cat > Dockerfile.model-artifact <<'EOF'
          FROM busybox:1.36
          WORKDIR /artifacts
          COPY model-artifacts/ /artifacts/
          EOF
          docker build -f Dockerfile.model-artifact -t "${IMAGE_REF}" .

      - name: Push artifact image
        run: docker push "${IMAGE_REF}"

      - name: Print artifact image ref
        run: echo "Published ${IMAGE_REF}"

      - name: Upload trained artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: model-artifacts/
          retention-days: 7

      - name: Cleanup compose
        if: always()
        run: docker compose down -v --remove-orphans
