name: Build Model Artifact Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional tag override (defaults to commit SHA)"
        required: false
        type: string
  push:
    branches: [main, master]
    paths:
      - "model/**"
      - "server/src/seed/**"
      - "server/seedDbGit.sh"
      - "server/seedDb.sh"
      - "docker-compose.yml"
      - ".github/workflows/model-artifact.yml"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image coordinates
        run: |
          set -euo pipefail
          owner_lc="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image_repo="${owner_lc}/auth-model-artifacts"
          tag_input="${{ github.event.inputs.image_tag }}"
          if [ -n "${tag_input}" ]; then
            image_tag="${tag_input}"
          else
            image_tag="${GITHUB_SHA}"
          fi
          echo "IMAGE_REPO=${image_repo}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${REGISTRY}/${image_repo}:${image_tag}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare env files for compose
        run: |
          cp .env.example .env
          cp server/.env.example server/.env

      - name: Build and start model stack
        run: docker compose up -d --build model server

      - name: Seed DB and request initial training
        run: docker compose exec -T server bash -lc "/app/seedDbGit.sh"

      - name: Wait for trained model artifacts
        run: |
          set -euo pipefail
          required_files=(
            "/app/data/ml_models/trained/arcface_yale_anony_v1_label_encoder.joblib"
            "/app/data/ml_models/trained/arcface_yale_anony_v1_rp_templates.joblib"
          )

          max_attempts=120
          sleep_seconds=10
          attempt=1
          while [ "$attempt" -le "$max_attempts" ]; do
            missing=0
            for f in "${required_files[@]}"; do
              if ! docker compose exec -T model sh -lc "test -f '$f'"; then
                missing=1
                break
              fi
            done

            if [ "$missing" -eq 0 ]; then
              echo "Trained artifacts detected."
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Timed out waiting for trained artifacts."
              docker compose logs model
              exit 1
            fi

            attempt=$((attempt + 1))
            sleep "$sleep_seconds"
          done

      - name: Export trained artifacts
        run: |
          set -euo pipefail
          rm -rf model-artifacts
          mkdir -p model-artifacts
          docker compose cp model:/app/data/ml_models/trained/. ./model-artifacts/
          test -f ./model-artifacts/arcface_yale_anony_v1_label_encoder.joblib
          test -f ./model-artifacts/arcface_yale_anony_v1_rp_templates.joblib

      - name: Build artifact image
        run: |
          set -euo pipefail
          cat > Dockerfile.model-artifact <<'EOF'
          FROM busybox:1.36
          WORKDIR /artifacts
          COPY model-artifacts/ /artifacts/
          EOF
          docker build -f Dockerfile.model-artifact -t "${IMAGE_REF}" .

      - name: Push artifact image
        run: docker push "${IMAGE_REF}"

      - name: Print artifact image ref
        run: echo "Published ${IMAGE_REF}"

      - name: Upload trained artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: model-artifacts/
          retention-days: 7

      - name: Cleanup compose
        if: always()
        run: docker compose down -v --remove-orphans
